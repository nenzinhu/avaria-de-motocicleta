<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/styles.css">
    <title>Avaria de Motocicleta</title>
</head>
<body>
    <div class="app">
        <h1>Avaria de Motocicleta</h1>
        <div id="svg-container">
            <svg width="500" height="500">
                <!-- Circle hotspots for motorcycle external parts -->
                <circle class="hotspot" cx="250" cy="250" r="30" style="fill: red;" />
                <circle class="hotspot" cx="100" cy="100" r="30" style="fill: blue;" />
                <circle class="hotspot" cx="400" cy="100" r="30" style="fill: green;" />
                <!-- Add more hotspots as necessary -->
            </svg>
        </div>
        <div id="output"></div>
    </div>
    <script>
        // Keeping the existing avaria text generation UI and behavior
        // Update to use .hotspot instead of .area for click handling
        document.querySelectorAll('.hotspot').forEach(hotspot => {
            hotspot.addEventListener('click', function() {
                // Logic for hotspot click handling
                const output = document.getElementById('output');
                output.innerHTML = 'You clicked on a hotspot!';
                // Additional logic for avaria text generation can be added here
            });
        });
    </script>
</body>
</html>
